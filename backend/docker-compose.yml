services:
  db:
    image: postgres:15-alpine
    container_name: trustbond-db
    environment:
      POSTGRES_USER: trustbond
      POSTGRES_PASSWORD: trustbond123
      POSTGRES_DB: trustbond
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustbond -d trustbond"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trustbond-network

  api:
    build: .
    container_name: trustbond-api
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-change-me}
      - DATABASE_URL=postgresql://trustbond:trustbond123@db:5432/trustbond
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trustbond-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  trustbond-network:
    driver: bridge
