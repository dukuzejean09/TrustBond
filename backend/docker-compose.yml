services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: trustbond_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trustbond
      POSTGRES_USER: trustbond
      POSTGRES_PASSWORD: trustbond123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./trustbond_complete_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustbond -d trustbond"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
