name: trustbond
description: "A new Flutter project."
publish_to: "none"

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http:
  geolocator:
  camera:
  path_provider:
  crypto:
  device_info_plus: ^11.0.0
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  sensors_plus: ^7.0.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.0.0
  battery_plus: ^4.0.0
  image: ^4.2.0
  path: ^1.8.3
  permission_handler: ^11.3.1
  
  # Firebase excluded for Windows compatibility

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
