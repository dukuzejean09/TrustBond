name: crime_report_app
description: Crime Incident Reporting App for Rwanda

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  audioplayers: ^5.2.1
  record: ^5.0.4
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  smooth_page_indicator: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
