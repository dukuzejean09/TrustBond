services:
  db:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trustbond}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trustbond"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy # ← waits for DB healthcheck to pass
    env_file:
      - backend/.env
    environment:
      DB_HOST: db # override so pg_isready targets the container
      DB_PORT: 5432
    volumes:
      - ./backend:/app # live-reload your code changes
      - ./backend/data:/app/data # incident_types.json lives here
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"

volumes:
  db_data:
