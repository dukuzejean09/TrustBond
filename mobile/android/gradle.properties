org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disable Kotlin incremental compilation to avoid "already registered" cache errors on Windows CI/locals
kotlin.incremental=false
# Also disable Gradle build cache for safer clean reproducible builds in this environment
org.gradle.caching=false
