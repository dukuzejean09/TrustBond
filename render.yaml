services:
  - type: web
    plan: free
    name: trustbond-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    repo: https://github.com/dukuzejean09/TrustBond.git
    branch: main
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually to your Neon.tech PostgreSQL connection string
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
