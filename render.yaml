services:
  - type: web
    plan: free
    name: trustbond-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    repo: https://github.com/dukuzejean09/TrustBond.git
    branch: main
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render dashboard: postgresql://neondb_owner:...@...neon.tech/neondb?sslmode=require&channel_binding=require
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://trustbond-mobile-app.vercel.app,https://trustbond-backend.onrender.com"
      - key: FRONTEND_URL
        value: "https://trustbond-mobile-app.vercel.app"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
