services:
  - type: web
    plan: free
    name: trustbond-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    repo: https://github.com/dukuzejean09/TrustBond.git
    branch: main
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually to your Neon.tech PostgreSQL connection string (no wrapping quotes)
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://trustbond-mobile-app.vercel.app,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
